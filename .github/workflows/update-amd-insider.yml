name: Update AMD Insider Data

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback days (used when year is empty)"
        required: false
        default: "3650"
      year:
        description: "Optional: update only this year (e.g. 2024)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update AMD insider data to Supabase
        env:
          SEC_USER_AGENT: "${{ secrets.SEC_USER_AGENT }}"
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
        run: |
          set -euo pipefail

          if [ -z "${SEC_USER_AGENT:-}" ]; then
            export SEC_USER_AGENT="${{ github.actor }} sec-monitor-contact@example.com"
          fi

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secret"
            exit 1
          fi

          DAYS="${{ github.event.inputs.days || '3650' }}"
          YEAR="${{ github.event.inputs.year || '' }}"

          if [ -n "$YEAR" ]; then
            echo "Updating Supabase for year=$YEAR"
            python amd-insider/amd_insider_monitor.py --year "$YEAR" --days "$DAYS" --to-supabase
          else
            echo "Updating Supabase for days=$DAYS"
            python amd-insider/amd_insider_monitor.py --days "$DAYS" --to-supabase
          fi
