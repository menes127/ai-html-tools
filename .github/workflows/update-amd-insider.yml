name: Update Insider Data (AMD/NVDA/TSM/TSLA)

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update insider data to Supabase (AMD/NVDA/TSM/TSLA)
        env:
          SEC_USER_AGENT: "${{ secrets.SEC_USER_AGENT }}"
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
        run: |
          set -euo pipefail

          if [ -z "${SEC_USER_AGENT:-}" ]; then
            export SEC_USER_AGENT="${{ github.actor }} sec-monitor-contact@example.com"
          fi

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secret"
            exit 1
          fi

          DAYS="30"
          echo "Updating Supabase for days=$DAYS, companies=AMD,NVDA,TSM,TSLA"
          python amd-insider/amd_insider_monitor.py --days "$DAYS" --company AMD --company NVDA --company TSM --company TSLA
